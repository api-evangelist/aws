- type: Features
  data:
  - name: Global Infrastructure
    description: Deploy applications across 30+ AWS Regions and 90+ Availability
      Zones worldwide.
  - name: Pay-as-you-go Pricing
    description: Pay only for the services you use with no upfront costs or 
      long-term commitments.
  - name: Comprehensive Security
    description: Built-in security with compliance programs, encryption, IAM, 
      and dedicated security services.
  - name: Managed Services
    description: Managed database, compute, storage, and networking services 
      with automatic patching and scaling.
  - name: Serverless Computing
    description: Run code, manage databases, and process streams without 
      managing infrastructure.
  - name: Machine Learning
    description: Pre-built ML services and tools for building, training, and 
      deploying ML models at scale.
  - name: Hybrid Cloud
    description: Extend AWS to on-premises with Outposts, Local Zones, and 
      Direct Connect.
  - name: DevOps Toolchain
    description: Integrated developer tools for CI/CD, infrastructure as code, 
      and monitoring.
  - name: Event-Driven Architecture
    description: Build decoupled, event-driven applications with SQS, SNS, 
      EventBridge, and Lambda.
  - name: Container Services
    description: Run containers with ECS, EKS, Fargate, and ECR for flexible 
      container workloads.
- type: UseCases
  data:
  - name: Web Application Hosting
    description: Host scalable web applications with EC2, S3, CloudFront, and 
      RDS.
  - name: Data Analytics
    description: Process and analyze large datasets using EMR, Redshift, Athena,
      and Glue.
  - name: Machine Learning
    description: Build and deploy ML models at scale using SageMaker, 
      Rekognition, and Comprehend.
  - name: Disaster Recovery
    description: Implement multi-region disaster recovery strategies with 
      minimal RPO and RTO.
  - name: IoT Applications
    description: Collect, process, and analyze IoT device data with AWS IoT Core
      and related services.
- type: Integrations
  data:
  - name: Terraform
    description: Manage AWS infrastructure as code using the official AWS 
      Terraform provider.
  - name: Kubernetes
    description: Deploy and manage Kubernetes workloads on AWS using Amazon EKS.
  - name: GitHub Actions
    description: Automate CI/CD pipelines deploying to AWS using GitHub Actions 
      and OIDC.
  - name: Datadog
    description: Monitor AWS infrastructure and applications using the Datadog 
      AWS integration.
  - name: Snowflake
    description: Integrate data workflows between Snowflake and AWS S3, Glue, 
      and Lake Formation.
