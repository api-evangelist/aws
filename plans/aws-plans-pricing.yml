specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Amazon Web Services (AWS)
providerId: aws
created: '2026-05-04'
modified: '2026-05-04'
reconciled: true
tags:
  - Cloud Infrastructure
  - Cloud
  - Multi-Service
description: Amazon Web Services (AWS) is a multi-product platform — pricing is per-service. This artifact
  catalogs the major service families and points to the vendor's pricing calculator. For detailed per-service
  rates, use the vendor pricing pages directly.
sources:
  - https://aws.amazon.com/pricing/
  - https://focus.finops.org/
plans:
  - id: aws-platform-overview
    name: Platform Pricing Overview
    type: enterprise
    description: Per-service pay-as-you-go + reserved/committed-use discounts.
    entries:
      - label: Per-service rates
        name: varies
        type: metered
        metric: varies
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: see vendor pricing calculator
        userMultiplied: false
    elements:
      - name: EC2 (compute)
      - name: S3 (object storage)
      - name: EBS (block storage)
      - name: RDS (managed SQL)
      - name: DynamoDB (NoSQL)
      - name: Lambda (serverless)
      - name: API Gateway
      - name: CloudFront (CDN)
      - name: Route 53 (DNS)
      - name: VPC (networking)
      - name: IAM (identity)
      - name: KMS (encryption)
      - name: Secrets Manager
      - name: CloudWatch (monitoring)
      - name: EKS (Kubernetes)
      - name: ECS (containers)
      - name: ECR (container registry)
      - name: SQS (queue)
      - name: SNS (pub-sub)
      - name: SES (email)
  - id: aws-committed-use
    name: Committed Use / Reserved
    type: enterprise
    description: 1-year and 3-year commitments offer 30-72% discount over on-demand.
    entries:
      - label: Annual commitment (custom)
        name: annual
        type: subscription
        metric: year
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: custom
        userMultiplied: false
    elements:
      - name: Reserved Instances / Savings Plans / Committed Use Discounts
      - name: Volume discounts
      - name: Negotiated enterprise agreements
  - id: aws-free-tier
    name: Free Tier / Trial
    type: freemium
    description: Most platforms offer a free tier or starting credits.
    entries:
      - label: Free tier (varies)
        name: free
        type: quota
        metric: service
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: 12-month free trial allowances
      - name: Always-free quotas
      - name: New account credits
